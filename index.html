<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>記帳 - 2026</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --text: #e2e8f0;
      --text-sec: #94a3b8;
      --accent: #3b82f6;
      --danger: #ef4444;
      --success: #10b981;
      --border: #334155;
      --orange: #f59e0b;
      --yellow: #facc15;
      --blue: #60a5fa;
    }
    body { margin:0; font-family:system-ui,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; padding-bottom:100px; }
    #page-title { padding:12px 16px; background:var(--card); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:10; font-size:1.1rem; font-weight:600; text-align:center; }
    .bottom-nav { position:fixed; bottom:0; left:0; right:0; background:var(--card); border-top:1px solid var(--border); display:flex; justify-content:space-around; padding:8px 0; z-index:100; }
    .nav-item { flex:1; display:flex; flex-direction:column; align-items:center; color:var(--text-sec); font-size:0.75rem; cursor:pointer; padding:4px 0; }
    .nav-item.active { color:var(--accent); }
    .nav-icon { font-size:1.8rem; margin-bottom:2px; }
    .fab { position:fixed; bottom:100px; right:24px; width:64px; height:64px; background:var(--accent); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:2.4rem; color:white; box-shadow:0 6px 16px rgba(59,130,246,0.5); cursor:pointer; z-index:99; }
    .fab:hover { transform:scale(1.1); }
    .page { display:none; padding:16px; max-width:480px; margin:0 auto; }
    .page.active { display:block; }
    .form-group { margin-bottom:20px; }
    label { display:block; color:var(--text-sec); margin-bottom:6px; font-size:0.9rem; }
    input, select, textarea { width:100%; padding:12px; border-radius:8px; border:1px solid var(--border); background:var(--card); color:var(--text); box-sizing:border-box; }
    .quick-tags { display:flex; flex-wrap:wrap; gap:8px; margin:8px 0; }
    .quick-tag { padding:6px 14px; background:var(--border); border-radius:20px; font-size:0.85rem; cursor:pointer; }
    .quick-tag.active { background:var(--accent); color:white; }
    .item-row { display:grid; grid-template-columns:140px 1fr 100px 40px; gap:8px; margin-bottom:12px; align-items:center; }
    .total { font-size:1.6rem; font-weight:bold; text-align:right; margin:24px 0; }
    .total.negative { color:var(--danger); }
    .calendar-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; text-align:center; font-size:0.9rem; }
    .calendar-day { padding:8px 0; border-radius:6px; cursor:pointer; background:var(--border); position:relative; }
    .calendar-day.today { background:var(--accent); color:white; }
    .calendar-day.has-record { border:2px solid var(--danger); }
    .calendar-day.has-record::after { content:''; position:absolute; top:2px; right:2px; width:6px; height:6px; background:var(--danger); border-radius:50%; }
    .record-item { background:var(--card); padding:10px; border-radius:8px; margin-bottom:6px; cursor:pointer; }
    .accordion-header { display:flex; justify-content:space-between; align-items:center; padding:12px; background:var(--border); border-radius:8px; cursor:pointer; margin-bottom:8px; }
    .accordion-content { padding:12px; background:var(--card); border-radius:0 0 8px 8px; display:none; }
    .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); justify-content:center; align-items:center; z-index:200; }
    .modal-content { background:var(--card); padding:24px; border-radius:12px; width:90%; max-width:420px; max-height:80vh; overflow-y:auto; }
    .back-btn { font-size:1.4rem; cursor:pointer; color:var(--accent); margin-bottom:16px; }
    .tag { padding:4px 8px; border-radius:12px; font-size:0.85rem; margin-right:6px; }
    .progress-bar { height:20px; background:var(--border); border-radius:10px; overflow:hidden; margin:8px 0; }
    .progress-fill { height:100%; transition:width 0.4s; }
  </style>
</head>
<body>

<div id="page-title">帳戶總覽</div>

<div id="accounts" class="page active">
  <div style="text-align:center; margin:32px 0;">
    <div style="color:var(--text-sec);">總資產 (TWD)</div>
    <div id="total-asset" style="font-size:3.2rem; font-weight:bold; color:var(--success);">0</div>
  </div>
  <div class="card">
    <div id="account-accordion"></div>
  </div>
</div>

<!-- 2. 專案總覽 -->
<div id="projects" class="page">
  <h2>專案總覽</h2>
  <div id="project-list"></div>
</div>

<!-- 3. 日曆 -->
<div id="calendar" class="page">
  <div style="text-align:center; margin:12px 0;">
    <button onclick="prevMonth()">◀</button>
    <span id="current-month" style="font-size:1.1rem; margin:0 12px;"></span>
    <button onclick="nextMonth()">▶</button>
  </div>
  <div class="calendar-grid" id="calendar-days"></div>
  <h3 style="margin:16px 0 8px;">當日紀錄</h3>
  <div id="daily-records"></div>
</div>

<!-- 新增記錄 -->
<div id="record" class="page">
  <h2>新增記錄</h2>
  <!-- 表單內容與之前相同，已省略以節省空間 -->
  <div class="form-group"><label>日期時間</label><input type="datetime-local" id="datetime"></div>
  <div class="form-group"><label>支付方式</label><div class="quick-tags" id="payment-quick"></div><select id="payment-account"></select></div>
  <div class="form-group"><label>商家</label><div class="quick-tags" id="merchant-quick"></div><input type="text" id="merchant"></div>
  <div class="form-group"><label>明細</label><div id="items-list"></div><div id="add-item" class="quick-tag">+ 新增一項</div></div>
  <div class="total" id="total-amount">0.00</div>
  <div class="form-group"><label>備註</label><textarea id="note"></textarea></div>
  <button id="save-record" style="width:100%;padding:14px;background:var(--success);color:white;border:none;border-radius:10px;">儲存</button>
</div>

<!-- 每月報表 -->
<div id="report" class="page">
  <div class="tabs" style="display:flex; margin-bottom:16px;">
    <div class="tab active" onclick="switchTab('overview')">總覽</div>
    <div class="tab" onclick="switchTab('detail')">明細</div>
    <div class="tab" onclick="switchTab('category')">類別</div>
    <div class="tab" onclick="switchTab('rank')">排行</div>
    <div class="tab" onclick="switchTab('account')">帳戶</div>
    <div class="tab" onclick="switchTab('project')">專案</div>
  </div>
  <div id="report-content">
    <div id="overview" class="tab-content active">
      <div style="margin:16px 0;">
        <div>支出 <span id="exp-count">0</span> <span style="color:var(--danger);">-5,368</span></div>
        <div class="progress-bar"><div id="exp-bar" class="progress-fill" style="width:45%;background:var(--danger);"></div></div>
      </div>
      <div>
        <div>收入 <span id="inc-count">0</span> <span style="color:var(--success);">+10,368</span></div>
        <div class="progress-bar"><div id="inc-bar" class="progress-fill" style="width:10%;background:var(--success);"></div></div>
      </div>
    </div>
    <div id="detail" class="tab-content" style="display:none;">明細內容（待實作）</div>
    <div id="category" class="tab-content" style="display:none;">類別內容（待實作）</div>
    <div id="rank" class="tab-content" style="display:none;">排行內容（待實作）</div>
    <div id="account" class="tab-content" style="display:none;">帳戶內容（待實作）</div>
    <div id="project" class="tab-content" style="display:none;">專案內容（待實作）</div>
  </div>
</div>

<!-- 設定 -->
<div id="settings" class="page">
  <div style="margin-bottom:24px;">
    <div class="card" onclick="showPage('categories')" style="margin-bottom:16px;padding:16px;cursor:pointer;">
      類別管理
    </div>
    <div class="card" onclick="showPage('accounts-mgmt')" style="margin-bottom:16px;padding:16px;cursor:pointer;">
      帳戶管理
    </div>
    <div class="card" style="padding:16px;margin-bottom:16px;">
      主題：深色模式
    </div>
    <div class="card" style="padding:16px;">
      <button onclick="exportData()" style="width:48%;margin-right:4%;padding:10px;background:var(--accent);color:white;border:none;border-radius:8px;">立即備份</button>
      <button onclick="document.getElementById('importFile').click()" style="width:48%;padding:10px;background:var(--orange);color:white;border:none;border-radius:8px;">還原資料</button>
      <input type="file" id="importFile" style="display:none;" accept=".json" onchange="importData(event)">
    </div>
  </div>
</div>

<!-- 類別管理頁 -->
<div id="categories" class="page">
  <div class="back-btn" onclick="showPage('settings')">← 返回</div>
  <h2>類別管理</h2>
  <button onclick="openCategoryModal()" style="width:100%;padding:12px;background:var(--accent);color:white;border:none;border-radius:8px;margin-bottom:16px;">+ 新增類別</button>
  <div id="category-list"></div>
</div>

<!-- 帳戶管理頁 -->
<div id="accounts-mgmt" class="page">
  <div class="back-btn" onclick="showPage('settings')">← 返回</div>
  <h2>帳戶管理</h2>
  <button onclick="openAccountModal()" style="width:100%;padding:12px;background:var(--accent);color:white;border:none;border-radius:8px;margin-bottom:16px;">+ 新增帳戶</button>
  <div id="account-list-mgmt"></div>
</div>

<!-- 底部導航 -->
<div class="bottom-nav">
  <div class="nav-item active" data-page="accounts"><div class="nav-icon">💰</div><div>帳戶總覽</div></div>
  <div class="nav-item" data-page="projects"><div class="nav-icon">📂</div><div>專案總覽</div></div>
  <div class="nav-item" data-page="calendar"><div class="nav-icon">📅</div><div>日曆</div></div>
  <div class="nav-item" data-page="report"><div class="nav-icon">📊</div><div>報表</div></div>
  <div class="nav-item" data-page="settings"><div class="nav-icon">⚙️</div><div>設定</div></div>
</div>

<div class="fab" onclick="showPage('record')">+</div>

<!-- Modal - 新增/編輯類別 -->
<div id="category-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); justify-content:center; align-items:center; z-index:200;">
  <div style="background:var(--card); padding:24px; border-radius:12px; width:90%; max-width:400px;">
    <h3 id="cat-modal-title">新增類別</h3>
    <div class="form-group"><label>名稱</label><input type="text" id="cat-name"></div>
    <div class="form-group">
      <label>類型</label>
      <select id="cat-type">
        <option value="expense">支出</option>
        <option value="income">收入</option>
      </select>
    </div>
    <div class="form-group">
      <label>圖示</label>
      <input type="file" id="cat-icon" accept="image/*">
      <img id="cat-preview" style="width:64px;height:64px;object-fit:contain;margin-top:8px;display:none;">
    </div>
    <div style="display:flex; gap:12px; margin-top:24px;">
      <button onclick="closeCategoryModal()" style="flex:1;padding:12px;background:#334155;color:white;border:none;border-radius:8px;">取消</button>
      <button onclick="saveCategory()" style="flex:1;padding:12px;background:var(--success);color:white;border:none;border-radius:8px;">儲存</button>
    </div>
  </div>
</div>

<!-- Modal - 新增/編輯帳戶 -->
<div id="account-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); justify-content:center; align-items:center; z-index:200;">
  <div style="background:var(--card); padding:24px; border-radius:12px; width:90%; max-width:400px;">
    <h3 id="acc-modal-title">新增帳戶</h3>
    <div class="form-group"><label>名稱</label><input type="text" id="acc-name"></div>
    <div class="form-group">
      <label>類型</label>
      <select id="acc-type">
        <option value="wallet">錢包</option>
        <option value="bank">銀行</option>
        <option value="epay">電子支付</option>
      </select>
    </div>
    <div class="form-group"><label>餘額</label><input type="number" id="acc-balance" step="0.01" value="0"></div>
    <div style="display:flex; gap:12px; margin-top:24px;">
      <button onclick="closeAccountModal()" style="flex:1;padding:12px;background:#334155;color:white;border:none;border-radius:8px;">取消</button>
      <button onclick="saveAccount()" style="flex:1;padding:12px;background:var(--success);color:white;border:none;border-radius:8px;">儲存</button>
    </div>
  </div>
</div>

<script>
// 共用函式
function showPage(pageId) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));

  document.getElementById(pageId).classList.add('active');
  document.querySelector(`.nav-item[data-page="${pageId}"]`)?.classList.add('active');

  document.getElementById('page-title').textContent = {
    accounts: '帳戶總覽',
    projects: '專案總覽',
    calendar: '日曆',
    record: '新增記錄',
    report: '每月報表',
    settings: '設定',
    categories: '類別管理',
    'accounts-mgmt': '帳戶管理'
  }[pageId] || '記帳';
}

// 導航綁定
document.querySelectorAll('.nav-item').forEach(item => {
  item.addEventListener('click', () => showPage(item.dataset.page));
});

// 資料初始化
let accounts = JSON.parse(localStorage.getItem('accounts') || '[]');
let categories = JSON.parse(localStorage.getItem('categories') || '[]');
let records = JSON.parse(localStorage.getItem('records') || '[]');

// 預設帳戶
if (!accounts.length) {
  accounts = [
    {id:'a1', name:'錢包現金', type:'wallet', balance:2000},
    {id:'a2', name:'國泰銀行', type:'bank', balance:1000},
    {id:'a3', name:'中國信託', type:'bank', balance:500},
    {id:'a4', name:'玉山銀行', type:'bank', balance:600},
    {id:'a5', name:'街口支付', type:'epay', balance:300}
  ];
  localStorage.setItem('accounts', JSON.stringify(accounts));
}

if (!categories.length) {
  categories = [
    {id:'c1', name:'宵夜', type:'expense', icon:'🌙'},
    {id:'c2', name:'飲料', type:'expense', icon:'🥤'},
    {id:'c3', name:'麵包', type:'expense', icon:'🍞'},
    {id:'c4', name:'早餐', type:'expense', icon:'🍳'}
  ];
  localStorage.setItem('categories', JSON.stringify(categories));
}

// 帳戶總覽 - 摺疊分類
function renderAccountAccordion() {
  const container = document.getElementById('account-accordion');
  if (!container) return;

  container.innerHTML = '';

  const groups = {
    wallet: { name:'現金', list:[], total:0 },
    bank: { name:'銀行', list:[], total:0 },
    epay: { name:'電子支付', list:[], total:0 }
  };

  accounts.forEach(acc => {
    if (groups[acc.type]) {
      groups[acc.type].list.push(acc);
      groups[acc.type].total += acc.balance || 0;
    }
  });

  Object.entries(groups).forEach(([key, group]) => {
    const header = document.createElement('div');
    header.className = 'accordion-header';
    header.innerHTML = `
      <span>± ${group.name} (${group.list.length})</span>
      <span style="color:${group.total >= 0 ? 'var(--success)' : 'var(--danger)'};">$${group.total.toFixed(0)}</span>
    `;

    const content = document.createElement('div');
    content.className = 'accordion-content';
    content.style.display = 'none';
    group.list.forEach(acc => {
      const div = document.createElement('div');
      div.style.padding = '8px 0';
      div.innerHTML = `${acc.name}：$${acc.balance.toFixed(0)}`;
      content.appendChild(div);
    });

    header.onclick = () => {
      content.style.display = content.style.display === 'block' ? 'none' : 'block';
      header.innerHTML = header.innerHTML.replace(/^[+-]/, content.style.display === 'block' ? '-' : '+');
    };

    container.appendChild(header);
    container.appendChild(content);
  });
}

// 專案總覽（以商家為例）
function updateProjectsPage() {
  const container = document.getElementById('project-list');
  container.innerHTML = '';

  const stats = {};
  records.forEach(r => {
    const key = r.merchant || '其他';
    stats[key] = (stats[key] || 0) + Math.abs(r.total || 0);
  });

  Object.entries(stats).forEach(([name, amt]) => {
    const div = document.createElement('div');
    div.className = 'card';
    div.innerHTML = `<span>${name}</span><span style="color:var(--danger);">$${amt.toFixed(0)}</span>`;
    container.appendChild(div);
  });
}

// 日曆
let currentDate = new Date(2026, 1, 1);

function renderCalendar() {
  document.getElementById('current-month').textContent = `${currentDate.getFullYear()}年 ${currentDate.getMonth()+1}月`;

  const grid = document.getElementById('calendar-days');
  grid.innerHTML = '';

  ['日','一','二','三','四','五','六'].forEach(d => {
    const div = document.createElement('div');
    div.textContent = d;
    div.style.padding = '8px';
    div.style.color = 'var(--text-sec)';
    grid.appendChild(div);
  });

  const first = new Date(currentDate.getFullYear(), currentDate.getMonth(), 1);
  const last = new Date(currentDate.getFullYear(), currentDate.getMonth()+1, 0);
  let start = first.getDay();

  for(let i=0; i<start; i++) grid.appendChild(document.createElement('div'));

  for(let d=1; d<=last.getDate(); d++) {
    const day = document.createElement('div');
    day.className = 'calendar-day';
    day.textContent = d;

    const dateStr = `${currentDate.getFullYear()}-${String(currentDate.getMonth()+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;

    if (dateStr === new Date().toISOString().slice(0,10)) day.classList.add('today');

    if (records.some(r => r.date?.startsWith(dateStr))) day.classList.add('has-record');

    day.onclick = () => {
      const cont = document.getElementById('daily-records');
      cont.innerHTML = `<h4>${dateStr}</h4>`;

      const dayRec = records.filter(r => r.date?.startsWith(dateStr));
      if (!dayRec.length) {
        cont.innerHTML += '<p style="color:var(--text-sec);">無紀錄</p>';
        return;
      }

      let total = 0;
      dayRec.forEach(r => {
        r.items.forEach(item => {
          const cat = categories.find(c => c.id === item.categoryId);
          const label = cat ? cat.name : '未知';
          const line = document.createElement('div');
          line.innerHTML = `[標籤(${label})] ${item.note || '未命名'} $${item.amount}`;
          cont.appendChild(line);
          total += item.amount;
        });
      });

      const sumLine = document.createElement('div');
      sumLine.style.marginTop = '12px';
      sumLine.style.fontWeight = 'bold';
      sumLine.innerHTML = `總計 -${total} [${dayRec[0]?.paymentAccount || '未知'}]`;
      cont.appendChild(sumLine);
    };

    grid.appendChild(day);
  }
}

function prevMonth() { currentDate.setMonth(currentDate.getMonth()-1); renderCalendar(); }
function nextMonth() { currentDate.setMonth(currentDate.getMonth()+1); renderCalendar(); }

// 新增記錄
let itemCounter = 0;

function loadQuickOptions() {
  const payQuick = document.getElementById('payment-quick');
  const paySelect = document.getElementById('payment-account');
  payQuick.innerHTML = '';
  paySelect.innerHTML = '<option value="">請選擇</option>';

  accounts.forEach(acc => {
    const opt = document.createElement('option');
    opt.value = acc.id;
    opt.textContent = acc.name;
    paySelect.appendChild(opt);

    const tag = document.createElement('div');
    tag.className = 'quick-tag';
    tag.textContent = acc.name;
    tag.onclick = () => {
      payQuick.querySelectorAll('.quick-tag').forEach(t => t.classList.remove('active'));
      tag.classList.add('active');
      paySelect.value = acc.id;
    };
    payQuick.appendChild(tag);
  });

  const merchQuick = document.getElementById('merchant-quick');
  merchQuick.innerHTML = '';
  ['7-11','全家','萊爾富'].forEach(m => {
    const tag = document.createElement('div');
    tag.className = 'quick-tag';
    tag.textContent = m;
    tag.onclick = () => document.getElementById('merchant').value = m;
    merchQuick.appendChild(tag);
  });
}

function addItemRow() {
  itemCounter++;
  const row = document.createElement('div');
  row.className = 'item-row';

  let opts = '<option value="">分類</option>';
  categories.forEach(c => opts += `<option value="${c.id}">${c.icon} ${c.name}</option>`);

  row.innerHTML = `
    <select class="cat">${opts}</select>
    <input type="number" class="amount-input" placeholder="金額" min="0">
    <input type="text" placeholder="品項名稱">
    <button onclick="this.parentElement.remove(); calculateTotal()">×</button>
  `;

  document.getElementById('items-list').appendChild(row);
  row.querySelectorAll('input,select').forEach(el => el.addEventListener('input', calculateTotal));
}

function calculateTotal() {
  let sum = 0;
  document.querySelectorAll('.item-row').forEach(r => {
    sum += Number(r.querySelector('.amount-input').value) || 0;
  });
  const el = document.getElementById('total-amount');
  el.textContent = sum.toFixed(2);
  el.className = 'total' + (sum < 0 ? ' negative' : '');
}

document.getElementById('add-item').onclick = addItemRow;

document.getElementById('save-record').onclick = () => {
  const paymentId = document.getElementById('payment-account').value;
  if (!paymentId) return alert('請選擇支付方式');

  let total = 0;
  const items = [];
  document.querySelectorAll('.item-row').forEach(row => {
    const catId = row.querySelector('.cat').value;
    const amt = Number(row.querySelector('.amount-input').value) || 0;
    const note = row.querySelector('input[type="text"]').value;
    if (catId && amt) {
      items.push({categoryId: catId, amount: amt, note});
      total += amt;
    }
  });

  if (!items.length) return alert('請至少輸入一筆金額');

  const acc = accounts.find(a => a.id === paymentId);
  if (acc) {
    acc.balance = (acc.balance || 0) - total;
    localStorage.setItem('accounts', JSON.stringify(accounts));
  }

  const record = {
    id: Date.now().toString(),
    date: document.getElementById('datetime').value || new Date().toISOString().slice(0,16),
    paymentAccount: paymentId,
    merchant: document.getElementById('merchant').value || '未分類',
    items,
    total: -total,
    note: document.getElementById('note').value || ''
  };

  records.push(record);
  localStorage.setItem('records', JSON.stringify(records));

  alert('記錄已儲存');
  updateAllPages();
};

// 報表 - 總覽長條
function switchTab(tabId) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');

  event.target.classList.add('active');
  document.getElementById(tabId).style.display = 'block';
}

// 更新所有頁面
function updateAllPages() {
  updateAccountsPage();
  updateProjectsPage();
  renderCalendar();
}

// 初始化（放在最後）
function init() {
  renderAccountAccordion();
  showPage('accounts');
  addItemRow();
  loadQuickOptions();
  renderCalendar();
  updateAllPages();
}

init();
</script>
